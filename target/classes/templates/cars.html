<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<head>
    <title>Cars | F1 Garage</title>
</head>
<body>
<main th:fragment="main">
    <section class="py-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="f1-page-title">Formula 1 <span class="f1-red">Cars</span></h1>
                <a th:href="@{/cars/add}" class="btn btn-f1-success">
                    <i class="fas fa-plus me-2"></i>Add New Car
                </a>
            </div>

            <!-- Filters -->
            <div class="f1-filters mb-4">
                <form th:action="@{/cars}" method="get" class="row g-3">
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text bg-dark text-light border-secondary">
                                <i class="fas fa-search"></i>
                            </span>
                            <input type="text" class="form-control bg-dark text-light border-secondary"
                                   name="model" th:value="${filterModel}" placeholder="Search by model...">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <select name="season" class="form-select bg-dark text-light border-secondary">
                            <option value="">All Seasons</option>
                            <option th:selected="${filterSeason == 2024}" value="2024">2024</option>
                            <option th:selected="${filterSeason == 2023}" value="2023">2023</option>
                            <option th:selected="${filterSeason == 2022}" value="2022">2022</option>
                            <option th:selected="${filterSeason == 2021}" value="2021">2021</option>
                            <option th:selected="${filterSeason == 2020}" value="2020">2020</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select name="team" class="form-select bg-dark text-light border-secondary">
                            <option value="">All Teams</option>
                            <option th:each="team : ${teams}" th:value="${team.name}" th:text="${team.name}"
                                    th:selected="${filterTeam == team.name}">Team</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-f1-primary w-100">
                            <i class="fas fa-filter me-1"></i>Filter
                        </button>
                    </div>
                </form>
            </div>

            <!-- Cars Grid -->
            <div class="row g-4" th:if="${carPage != null and !carPage.isEmpty()}">
                <div class="col-md-6 col-lg-4" th:each="car : ${carPage.content}">
                    <div class="f1-card h-100">
                        <div class="f1-card-image">
                            <img th:if="${car.imageName != null}" th:src="@{/uploads/{filename}(filename=${car.imageName})}" alt="Car">
                            <div th:unless="${car.imageName != null}" class="f1-card-placeholder">
                                <i class="fas fa-car-side"></i>
                            </div>
                            <div class="f1-card-actions">
                                <a th:href="@{/cars/edit/{id}(id=${car.id})}" class="btn btn-sm btn-warning">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/cars/delete/{id}(id=${car.id})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Are you sure you want to delete this car?')">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </div>
                        </div>
                        <div class="f1-card-body">
                            <h5 class="f1-card-title" th:text="${car.model}">Car Model</h5>
                            <p class="f1-card-team" th:if="${car.team != null}" th:text="${car.team.name}">Team</p>
                            <div class="f1-card-specs">
                                <span class="f1-spec">
                                    <i class="fas fa-tachometer-alt"></i>
                                    <span th:text="${car.horsepower != null ? car.horsepower : 'N/A'}">800</span> HP
                                </span>
                                <span class="f1-spec">
                                    <i class="fas fa-speed"></i>
                                    <span th:text="${car.topSpeed != null ? car.topSpeed : 'N/A'}">350</span> km/h
                                </span>
                                <span class="f1-spec">
                                    <i class="fas fa-calendar"></i>
                                    <span th:text="${car.season}">2024</span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div class="f1-empty-state" th:if="${carPage == null or carPage.isEmpty()}">
                <i class="fas fa-car-crash"></i>
                <h3>No Cars Found</h3>
                <p>No cars match your search criteria. Try adjusting your filters or add a new car.</p>
                <a th:href="@{/cars/add}" class="btn btn-f1-primary">
                    <i class="fas fa-plus me-2"></i>Add First Car
                </a>
            </div>

            <!-- Pagination -->
            <nav aria-label="Page navigation" class="mt-4" th:if="${carPage != null and carPage.totalPages > 1}">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${carPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/cars(page=${carPage.number - 1},model=${filterModel},season=${filterSeason},team=${filterTeam})}">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, carPage.totalPages - 1)}"
                        th:classappend="${i == carPage.number} ? 'active'">
                        <a class="page-link" th:href="@{/cars(page=${i},model=${filterModel},season=${filterSeason},team=${filterTeam})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${carPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/cars(page=${carPage.number + 1},model=${filterModel},season=${filterSeason},team=${filterTeam})}">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </section>
</main>
</body>
</html>
