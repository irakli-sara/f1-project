<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark f1-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="fas fa-flag-checkered me-2"></i><span th:text="${appTitle}">F1 Garage</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/cars}">Cars</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/teams}">Teams</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/contact}">Contact</a>
                </li>
            </ul>
            <div class="d-flex gap-2">
                <a th:href="@{/cars/add}" class="btn btn-f1-success">
                    <i class="fas fa-plus me-1"></i>Add Car
                </a>
                <a th:href="@{/teams/add}" class="btn btn-outline-light">
                    <i class="fas fa-plus me-1"></i>Add Team
                </a>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
