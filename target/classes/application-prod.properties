# Prod Profile - PostgreSQL/MySQL

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/f1cars
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:f1user}
spring.datasource.password=${DB_PASSWORD:f1pass}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# App
app.title=F1 Garage
